<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>¡Español! – 4ème</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:    #FF4757;
  --yellow: #FFD32A;
  --green:  #2ED573;
  --blue:   #1E90FF;
  --orange: #FF6B35;
  --purple: #A55EEA;
  --pink:   #FF6B9D;
  --teal:   #26de81;
  --bg:     #0f0f1a;
  --card:   #1a1a2e;
  --card2:  #16213e;
  --text:   #f0f0ff;
  --muted:  rgba(240,240,255,0.55);
  --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}
.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.screen.active { display: flex; }
.scroll-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

/* ── HOME ── */
#home { background: linear-gradient(160deg, #0f0f1a 0%, #1a0a2e 100%); }
.home-hero { text-align: center; padding: 2.2rem 1.5rem 1.2rem; }
.hero-emoji { font-size: 3.5rem; display: block; animation: bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
.hero-title {
  font-family: 'Baloo 2', cursive; font-size: 2.6rem; font-weight: 800;
  background: linear-gradient(90deg, var(--yellow), var(--red), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1.1; margin: 0.3rem 0;
}
.hero-sub { color: var(--muted); font-size: 0.9rem; font-weight: 600; }
.section-label {
  font-family: 'Baloo 2', cursive; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  padding: 0 1.5rem; margin-bottom: 0.5rem;
}
.chapter-list { display: flex; flex-direction: column; gap: 0.85rem; padding: 0 1.2rem; margin-bottom: 1.5rem; }
.chapter-card {
  border-radius: var(--radius); padding: 1rem 1.2rem; cursor: pointer;
  position: relative; overflow: hidden; transition: transform 0.18s, box-shadow 0.18s;
  display: flex; align-items: center; gap: 0.9rem; border: none; text-align: left; width: 100%;
}
.chapter-card:active { transform: scale(0.97); }
.chapter-card::before { content:''; position:absolute; inset:0; opacity:0.12; background:white; border-radius:inherit; }
.chapter-card.ar    { background: linear-gradient(135deg,#FF4757,#FF6B35); box-shadow: 0 8px 24px rgba(255,71,87,0.35); }
.chapter-card.er    { background: linear-gradient(135deg,#1E90FF,#A55EEA); box-shadow: 0 8px 24px rgba(30,144,255,0.3); }
.chapter-card.ir    { background: linear-gradient(135deg,#2ED573,#26de81); box-shadow: 0 8px 24px rgba(46,213,115,0.3); }
.chapter-card.ser   { background: linear-gradient(135deg,#FFD32A,#FF6B35); box-shadow: 0 8px 24px rgba(255,211,42,0.3); }
.chapter-card.irr   { background: linear-gradient(135deg,#A55EEA,#FF6B9D); box-shadow: 0 8px 24px rgba(165,94,234,0.35); }
.chapter-card.pc    { background: linear-gradient(135deg,#FF6B35,#FFD32A); box-shadow: 0 8px 24px rgba(255,107,53,0.3); }
.chapter-card.adv   { background: linear-gradient(135deg,#FF6B9D,#A55EEA); box-shadow: 0 8px 24px rgba(255,107,157,0.3); }
.chapter-card.gusta { background: linear-gradient(135deg,#FF4757,#FF6B9D); box-shadow: 0 8px 24px rgba(255,71,87,0.3); }
.chapter-card.salud { background: linear-gradient(135deg,#26de81,#1E90FF); box-shadow: 0 8px 24px rgba(38,222,129,0.3); }
.chapter-card.casa  { background: linear-gradient(135deg,#FFD32A,#26de81); box-shadow: 0 8px 24px rgba(255,211,42,0.3); }
.chapter-card.voc   { background: linear-gradient(135deg,#26de81,#1E90FF); box-shadow: 0 8px 24px rgba(38,222,129,0.25); opacity:0.45; }
.card-icon { font-size: 2.2rem; flex-shrink: 0; }
.card-info { flex: 1; }
.card-title { font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800; color: white; line-height: 1.2; }
.card-desc  { font-size: 0.78rem; color: rgba(255,255,255,0.8); margin-top: 0.1rem; }
.card-badge { background:rgba(255,255,255,0.25); color:white; font-size:0.68rem; font-weight:700; padding:0.2rem 0.55rem; border-radius:20px; flex-shrink:0; }
.card-soon  { font-size:0.68rem; color:rgba(255,255,255,0.6); font-weight:700; flex-shrink:0; }

/* ── CHAPTER ── */
#chapter { background: var(--bg); }
.chapter-header {
  padding: 1rem 1.2rem 0.8rem; display: flex; align-items: center; gap: 0.8rem;
  background: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
}
.back-btn {
  background:rgba(255,255,255,0.1); border:none; border-radius:12px;
  width:38px; height:38px; font-size:1.1rem; cursor:pointer; color:white; flex-shrink:0; transition:background 0.15s;
}
.back-btn:active { background:rgba(255,255,255,0.2); }
.chapter-header-title { font-family:'Baloo 2',cursive; font-size:1.2rem; font-weight:800; }
.tab-strip {
  display:flex; gap:0.5rem; padding:0.7rem 1.2rem; overflow-x:auto;
  scrollbar-width:none; flex-shrink:0; background:var(--bg);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.tab-strip::-webkit-scrollbar { display:none; }
.tab-pill {
  border:none; border-radius:30px; padding:0.38rem 0.9rem;
  font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:700;
  cursor:pointer; white-space:nowrap; transition:all 0.15s;
  background:rgba(255,255,255,0.08); color:var(--muted);
}
.tab-pill.active { color:white; background:rgba(255,255,255,0.18); transform:scale(1.05); }
.chapter-content { padding: 0.8rem 1.2rem; }

/* ── TENSE BLOCKS ── */
.tense-block { background:var(--card); border-radius:var(--radius); margin-bottom:0.9rem; overflow:hidden; animation:fadeUp 0.3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.tense-header { display:flex; align-items:center; gap:0.7rem; padding:0.85rem 1.1rem; }
.tense-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.tense-name { font-family:'Baloo 2',cursive; font-size:1rem; font-weight:800; }
.tense-usage { font-size:0.72rem; color:var(--muted); margin-top:0.05rem; }
.conjugation-table { width:100%; border-collapse:collapse; }
.conjugation-table tr:not(:last-child) td { border-bottom:1px solid rgba(255,255,255,0.05); }
.conjugation-table td { padding:0.55rem 1.1rem; font-size:0.9rem; }
.td-pronoun { color:var(--muted); font-weight:700; width:36%; font-size:0.82rem; }
.td-stem { color:var(--muted); }
.td-end  { font-weight:900; }
.td-full { font-weight:700; }

/* ── TIP BOX ── */
.tip-box {
  background:rgba(255,211,42,0.08); border-left:4px solid var(--yellow);
  border-radius:12px; padding:0.75rem 1rem; margin-bottom:0.9rem;
  font-size:0.83rem; line-height:1.5;
}
.tip-box strong { color:var(--yellow); }

/* ── EXAMPLE CHIPS ── */
.chips-wrap { display:flex; flex-wrap:wrap; gap:0.45rem; margin-bottom:1.2rem; }
.chip { background:rgba(255,255,255,0.08); border-radius:20px; padding:0.3rem 0.75rem; font-size:0.82rem; font-weight:700; }

/* ── PHRASE BUILDER ── */
.phrase-block { background:var(--card); border-radius:var(--radius); margin-bottom:0.9rem; padding:1rem 1.1rem; }
.phrase-block h3 { font-family:'Baloo 2',cursive; font-size:0.95rem; font-weight:800; margin-bottom:0.7rem; }
.phrase-row { display:flex; align-items:baseline; gap:0.4rem; margin-bottom:0.55rem; font-size:0.88rem; }
.phrase-struct { color:var(--yellow); font-weight:900; font-size:0.82rem; }
.phrase-ex { color:var(--muted); font-style:italic; font-size:0.8rem; display:block; margin-top:0.1rem; }

/* ── SER/ESTAR ── */
.comparison-block { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; margin-bottom:0.9rem; }
.comp-card { background:var(--card); border-radius:var(--radius); overflow:hidden; }
.comp-card-head { padding:0.65rem 0.9rem; font-family:'Baloo 2',cursive; font-size:1rem; font-weight:800; color:white; }
.comp-card-head.ser   { background:linear-gradient(135deg,#FF4757,#FF6B35); }
.comp-card-head.estar { background:linear-gradient(135deg,#1E90FF,#A55EEA); }
.comp-row { display:flex; justify-content:space-between; padding:0.42rem 0.9rem; font-size:0.8rem; border-bottom:1px solid rgba(255,255,255,0.05); }
.comp-row:last-child { border-bottom:none; }
.comp-pron { color:var(--muted); font-weight:700; }
.comp-form.ser-c   { color:#FF6B35; font-weight:900; }
.comp-form.estar-c { color:#1E90FF; font-weight:900; }
.use-block { background:var(--card); border-radius:var(--radius); padding:0.9rem 1rem; margin-bottom:0.8rem; }
.use-block h3 { font-family:'Baloo 2',cursive; font-size:0.9rem; font-weight:800; margin-bottom:0.55rem; }
.use-item { display:flex; align-items:flex-start; gap:0.55rem; font-size:0.8rem; margin-bottom:0.45rem; line-height:1.4; }
.use-bullet { font-size:0.95rem; flex-shrink:0; }
.use-ex { color:var(--muted); font-style:italic; display:block; margin-top:0.08rem; }

/* ── ADVERBES ── */
.adv-section-title { font-family:'Baloo 2',cursive; font-size:0.82rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; margin:0.3rem 0 0.55rem; display:flex; align-items:center; gap:0.4rem; }
.adv-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin-bottom:0.9rem; }
.adv-card { background:var(--card); border-radius:14px; padding:0.7rem; text-align:center; position:relative; overflow:hidden; }
.adv-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
.adv-card.time::after   { background:var(--yellow); }
.adv-card.place::after  { background:var(--blue); }
.adv-card.quant::after  { background:var(--green); }
.adv-card.mode::after   { background:var(--pink); }
.adv-esp { font-family:'Baloo 2',cursive; font-size:0.95rem; font-weight:800; color:white; }
.adv-fr  { font-size:0.75rem; color:var(--muted); margin-top:0.1rem; }

/* ── IRREGULAR VERBS ── */
.irr-verb-block { background:var(--card); border-radius:var(--radius); margin-bottom:0.9rem; overflow:hidden; animation:fadeUp 0.3s ease both; }
.irr-verb-header { padding:0.85rem 1.1rem; display:flex; align-items:center; gap:0.8rem; }
.irr-verb-inf { font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:800; }
.irr-verb-tr  { font-size:0.8rem; color:var(--muted); }
.irr-badge { background:rgba(255,255,255,0.15); color:white; font-size:0.65rem; font-weight:700; padding:0.18rem 0.5rem; border-radius:10px; margin-left:auto; }

/* ── GUSTA / HEALTH ── */
.vocab-section { margin-bottom:1rem; }
.vocab-section-title { font-family:'Baloo 2',cursive; font-size:0.88rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:0.6rem; }
.vocab-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.55rem; }
.vocab-card { background:var(--card); border-radius:14px; padding:0.75rem 0.85rem; }
.vocab-esp  { font-family:'Baloo 2',cursive; font-size:0.95rem; font-weight:800; color:white; }
.vocab-fr   { font-size:0.75rem; color:var(--muted); margin-top:0.1rem; }
.vocab-card.highlight { border-left:3px solid var(--yellow); }

.body-diagram { background:var(--card); border-radius:var(--radius); padding:1rem; margin-bottom:0.9rem; text-align:center; }
.body-diagram .body-title { font-family:'Baloo 2',cursive; font-size:0.9rem; font-weight:800; margin-bottom:0.8rem; color:var(--yellow); }
.body-list { display:grid; grid-template-columns:1fr 1fr; gap:0.4rem; text-align:left; }
.body-item { display:flex; gap:0.4rem; font-size:0.82rem; align-items:center; }
.body-emoji { font-size:1rem; flex-shrink:0; }
.body-esp { font-weight:800; }
.body-fr  { color:var(--muted); font-size:0.75rem; }

/* ── QUIZ ── */
.quiz-wrap { padding-bottom: 0.5rem; }
.quiz-progress-bar { height:6px; background:rgba(255,255,255,0.1); border-radius:3px; margin-bottom:1rem; overflow:hidden; }
.quiz-progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--green),var(--teal)); transition:width 0.4s ease; }
.quiz-score-badge { text-align:right; font-size:0.78rem; font-weight:700; color:var(--muted); margin-bottom:0.75rem; }
.quiz-card { background:var(--card); border-radius:var(--radius); padding:1.2rem; margin-bottom:0.8rem; animation:fadeUp 0.25s ease both; }
.quiz-q { font-family:'Baloo 2',cursive; font-size:1.05rem; font-weight:800; margin-bottom:0.9rem; line-height:1.3; }
.quiz-q .hl { color:var(--yellow); }
.quiz-q em { color:var(--pink); font-style:italic; }
.quiz-options { display:grid; grid-template-columns:1fr 1fr; gap:0.55rem; }
.quiz-opt {
  background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.1);
  border-radius:14px; padding:0.65rem 0.4rem; font-family:'Nunito',sans-serif;
  font-size:0.88rem; font-weight:700; color:white; cursor:pointer; text-align:center; transition:all 0.15s;
}
.quiz-opt:active:not(.answered) { transform:scale(0.96); }
.quiz-opt.correct { background:rgba(46,213,115,0.25); border-color:var(--green); color:var(--green); }
.quiz-opt.wrong   { background:rgba(255,71,87,0.2); border-color:var(--red); color:var(--red); }
.quiz-opt.answered { pointer-events:none; }
.quiz-feedback { margin-top:0.75rem; font-size:0.83rem; font-weight:700; min-height:1.1rem; }
.quiz-feedback.ok  { color:var(--green); }
.quiz-feedback.nok { color:var(--red); }
.quiz-next-btn {
  width:100%; background:linear-gradient(135deg,var(--blue),var(--purple));
  border:none; border-radius:16px; padding:0.8rem; font-family:'Baloo 2',cursive;
  font-size:0.95rem; font-weight:800; color:white; cursor:pointer; margin-top:0.75rem; display:none;
}
.quiz-result { text-align:center; padding:2rem 1rem; animation:fadeUp 0.3s ease both; }
.result-emoji { font-size:3.5rem; display:block; margin-bottom:0.5rem; }
.result-title { font-family:'Baloo 2',cursive; font-size:1.7rem; font-weight:800; }
.result-score { font-size:1rem; color:var(--muted); margin:0.3rem 0 1.2rem; }
.result-retry {
  background:linear-gradient(135deg,var(--red),var(--orange)); border:none; border-radius:16px;
  padding:0.8rem 2rem; font-family:'Baloo 2',cursive; font-size:0.95rem; font-weight:800; color:white; cursor:pointer;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; background:rgba(15,15,26,0.97);
  backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.08);
  display:flex; z-index:100; flex-shrink:0;
}
.nav-btn {
  flex:1; background:none; border:none; padding:0.65rem 0.5rem 0.45rem;
  display:flex; flex-direction:column; align-items:center; gap:0.15rem;
  cursor:pointer; color:var(--muted); font-family:'Nunito',sans-serif; font-size:0.65rem; font-weight:700;
}
.nav-btn .nav-icon { font-size:1.3rem; }
.nav-btn.active { color:var(--yellow); }
</style>
</head>
<body>

<!-- ════════ HOME ════════ -->
<div id="home" class="screen active">
  <div class="scroll-area">
    <div class="home-hero">
      <span class="hero-emoji">🌮</span>
      <div class="hero-title">¡Español!</div>
      <div class="hero-sub">4ème · Fiches de révision</div>
    </div>

    <div class="section-label">🧱 Conjugaison</div>
    <div class="chapter-list" style="margin-bottom:1.2rem">
      <button class="chapter-card ar"   onclick="openChapter('ar')">
        <div class="card-icon">🔴</div>
        <div class="card-info"><div class="card-title">Verbes en -AR</div><div class="card-desc">hablar, cantar, bailar…</div></div>
        <div class="card-badge">5 temps</div>
      </button>
      <button class="chapter-card er"   onclick="openChapter('er')">
        <div class="card-icon">🔵</div>
        <div class="card-info"><div class="card-title">Verbes en -ER</div><div class="card-desc">comer, beber, leer…</div></div>
        <div class="card-badge">5 temps</div>
      </button>
      <button class="chapter-card ir"   onclick="openChapter('ir')">
        <div class="card-icon">🟢</div>
        <div class="card-info"><div class="card-title">Verbes en -IR</div><div class="card-desc">vivir, escribir, abrir…</div></div>
        <div class="card-badge">5 temps</div>
      </button>
      <button class="chapter-card ser"  onclick="openChapter('ser')">
        <div class="card-icon">⭐</div>
        <div class="card-info"><div class="card-title">Ser vs Estar</div><div class="card-desc">être permanent vs temporaire</div></div>
        <div class="card-badge">Irréguliers</div>
      </button>
      <button class="chapter-card irr"  onclick="openChapter('irr')">
        <div class="card-icon">⚡</div>
        <div class="card-info"><div class="card-title">Verbes irréguliers</div><div class="card-desc">querer, poder, tener, ir, hacer, caer, dar…</div></div>
        <div class="card-badge">12 verbes</div>
      </button>
      <button class="chapter-card pc"   onclick="openChapter('pc')">
        <div class="card-icon">🕐</div>
        <div class="card-info"><div class="card-title">Passé composé</div><div class="card-desc">haber + participe passé</div></div>
        <div class="card-badge">Temps</div>
      </button>
    </div>

    <div class="section-label">💬 S'exprimer</div>
    <div class="chapter-list" style="margin-bottom:1.2rem">
      <button class="chapter-card adv"   onclick="openChapter('adv')">
        <div class="card-icon">💫</div>
        <div class="card-info"><div class="card-title">Adverbes</div><div class="card-desc">tiempo, lugar, cantidad, modo</div></div>
        <div class="card-badge">40 mots</div>
      </button>
      <button class="chapter-card gusta" onclick="openChapter('gusta')">
        <div class="card-icon">❤️</div>
        <div class="card-info"><div class="card-title">Aimer / Détester</div><div class="card-desc">me gusta, odio, me encanta…</div></div>
        <div class="card-badge">Expressions</div>
      </button>
      <button class="chapter-card salud" onclick="openChapter('salud')">
        <div class="card-icon">🏥</div>
        <div class="card-info"><div class="card-title">La santé</div><div class="card-desc">estoy enfermo, me duele…</div></div>
        <div class="card-badge">Corps + maladie</div>
      </button>
      <button class="chapter-card casa" onclick="openChapter('casa')">
        <div class="card-icon">🏠</div>
        <div class="card-info"><div class="card-title">La maison</div><div class="card-desc">ranger, ménage, pièces, objets…</div></div>
        <div class="card-badge">Thématique</div>
      </button>
    </div>

    <div class="section-label">🗂️ Vocabulaire</div>
    <div class="chapter-list">
      <button class="chapter-card voc">
        <div class="card-icon">🗂️</div>
        <div class="card-info"><div class="card-title">Thèmes à venir</div><div class="card-desc">Famille, loisirs, école, nourriture…</div></div>
        <div class="card-soon">Bientôt ✨</div>
      </button>
    </div>
  </div>
</div>

<!-- ════════ CHAPTER ════════ -->
<div id="chapter" class="screen">
  <div class="chapter-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="chapter-header-title" id="chapterTitle"></div>
  </div>
  <div class="tab-strip" id="tabStrip"></div>
  <div class="scroll-area">
    <div class="chapter-content" id="chapterContent"></div>
  </div>
</div>

<!-- ════════ BOTTOM NAV ════════ -->
<nav class="bottom-nav" id="bottomNav" style="display:none">
  <button class="nav-btn" id="navMap"  onclick="switchTab('map')"><span class="nav-icon">🗺️</span>Fiches</button>
  <button class="nav-btn" id="navQuiz" onclick="switchTab('quiz')"><span class="nav-icon">⚡</span>Quiz</button>
</nav>

<script>
// ═══════════════════════════════════════════════════════
//  QUIZ BANK — large pool, drawn randomly each session
// ═══════════════════════════════════════════════════════

const QUIZ_POOL = {

let currentChapter = null;
let currentTab = 'map';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() {
  show('home');
  document.getElementById('bottomNav').style.display = 'none';
}
function openChapter(key) {
  currentChapter = key;
  currentTab = (key === 'ser' || key === 'adv') ? 'quiz' : 'map';
  document.getElementById('chapterTitle').textContent = CHAPTERS_META[key].title;
  buildTabStrip(key);
  renderTab(currentTab);
  show('chapter');
  document.getElementById('bottomNav').style.display = 'flex';
  updateNavHighlight();
  document.querySelector('#chapter .scroll-area').scrollTop = 0;
}
function switchTab(tab) {
  currentTab = tab;
  renderTab(tab);
  updateNavHighlight();
  document.querySelector('#chapter .scroll-area').scrollTop = 0;
}
function updateNavHighlight() {
  document.getElementById('navMap').classList.toggle('active', currentTab==='map');
  document.getElementById('navQuiz').classList.toggle('active', currentTab==='quiz');
  document.querySelectorAll('.tab-pill').forEach(p => p.classList.remove('active'));
  const pill = document.getElementById('pill-'+currentTab);
  if (pill) pill.classList.add('active');
}
function buildTabStrip(key) {
  const strip = document.getElementById('tabStrip');
  strip.innerHTML = '';
  const noMap = ['ser','adv'];
  if (!noMap.includes(key)) {
    const m = document.createElement('button');
    m.className = 'tab-pill' + (currentTab==='map' ? ' active':'');
    m.id = 'pill-map'; m.textContent = '🗺️ Fiches';

//  RENDER DISPATCH
// ═══════════════════════════════════════════════════════
function renderTab(tab) {
  const content = document.getElementById('chapterContent');
  content.innerHTML = '';
  if (tab === 'map') {
    if (['ar','er','ir'].includes(currentChapter)) renderTenses(content);
    else if (currentChapter === 'ser') renderSerEstar(content);
    else if (currentChapter === 'irr') renderIrregular(content);
    else if (currentChapter === 'pc')  renderPC(content);
    else if (currentChapter === 'adv') renderAdverbes(content);
    else if (currentChapter === 'gusta') renderGusta(content);
    else if (currentChapter === 'salud') renderSalud(content);
    else if (currentChapter === 'casa')  renderCasa(content);
  } else {
    renderQuiz(content);
  }
}

  // Tâches ménagères

// ═══════════════════════════════════════════════════════
//  QUIZ — random draw from pool
// ═══════════════════════════════════════════════════════
function renderQuiz(container) {
  const pool = QUIZ_POOL[currentChapter] || [];
  // Draw up to 10 random questions
  const questions = shuffle(pool).slice(0, Math.min(10, pool.length));

  const wrap = document.createElement('div');
  wrap.className = 'quiz-wrap';
  let qi = 0, score = 0, answered = false;

  const progressBar = document.createElement('div');
  progressBar.className = 'quiz-progress-bar';
  progressBar.innerHTML = `<div class="quiz-progress-fill" id="qFill" style="width:0%"></div>`;
  wrap.appendChild(progressBar);

  const scoreBadge = document.createElement('div');
  scoreBadge.className = 'quiz-score-badge';
  scoreBadge.id = 'qScore';
  scoreBadge.textContent = `0 / ${questions.length}`;
  wrap.appendChild(scoreBadge);

  const cardEl = document.createElement('div');
  wrap.appendChild(cardEl);
  container.appendChild(wrap);

  function renderQ() {
    if (qi >= questions.length) { showResult(); return; }
    answered = false;
    const q = questions[qi];
    document.getElementById('qFill').style.width = (qi/questions.length*100)+'%';
    document.getElementById('qScore').textContent = `${score} / ${questions.length}`;
    const opts = shuffle([...q.opts]);
    cardEl.innerHTML = `
      <div class="quiz-card">
        <div class="quiz-q">Q${qi+1}/${questions.length} — ${q.q}</div>
        <div class="quiz-options">
          ${opts.map(o=>`<button class="quiz-opt" onclick="answerQ(this,'${esc(o)}','${esc(q.a)}')">${o}</button>`).join('')}
        </div>
        <div class="quiz-feedback" id="qFeedback"></div>
        <button class="quiz-next-btn" id="qNext" onclick="nextQ()">Suivant →</button>
      </div>`;
  }

  window.answerQ = (btn, chosen, correct) => {
    if (answered) return;
    answered = true;
    btn.parentElement.querySelectorAll('.quiz-opt').forEach(b => {
      b.classList.add('answered');
      if (b.textContent === correct) b.classList.add('correct');
    });
    const fb = document.getElementById('qFeedback');
    if (chosen === correct) {
      btn.classList.add('correct');
      fb.className='quiz-feedback ok'; fb.textContent='✅ ¡Muy bien!';
      score++;
    } else {
      btn.classList.add('wrong');
      fb.className='quiz-feedback nok'; fb.textContent=`❌ C'était : ${correct}`;
    }
    document.getElementById('qNext').style.display='block';
  };

  window.nextQ = () => { qi++; renderQ(); };

  function showResult() {
    document.getElementById('qFill').style.width='100%';
    const pct = Math.round(score/questions.length*100);
    const [emoji,msg] = pct>=80?['🏆','¡Excelente!']:pct>=50?['💪','¡Bien hecho!']:['😅','¡Sigue practicando!'];
    cardEl.innerHTML = `
      <div class="quiz-result">
        <span class="result-emoji">${emoji}</span>
        <div class="result-title">${msg}</div>
        <div class="result-score">${score} / ${questions.length} (${pct}%)</div>
        <button class="result-retry" onclick="retryQuiz()">🔄 Nouveau tirage</button>
      </div>`;
  }

  window.retryQuiz = () => {
    const newQ = shuffle(pool).slice(0, Math.min(10, pool.length));
    qi=0; score=0;
    questions.length=0; newQ.forEach(q=>questions.push(q));
    renderQ();
  };

  renderQ();
}

function esc(s) { return s.replace(/'/g,"\\'"); }
